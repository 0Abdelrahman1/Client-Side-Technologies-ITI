<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form {
            font-weight: bold;
        }
        #Login {color: red}
        #signin { text-align: center;}
    </style>
</head>
<body>
    <form action="home.html" method="get">
        <fieldset>
        <legend id="Login">Login</legend>
        <label for="un">User <u>n</u>ame:</label>
        <br>
        <input type="text" id="un" name="un" accesskey="n" placeholder="Enter user name">
        <br>
        <label for="pswd">User <u>p</u>assword:</label>
        <br>
        <input type="text" id="pswd" name="pswd" accesskey="p" placeholder="Enter user password">
        <br>
        <input type="checkbox" accesskey="R" name="chb" id="chb">
        <label for="chb"><u>R</u>emember me</label>
        <div id="signin"> <input type="submit" value="Sign in.."> </div>
        </fieldset>
    </form>
</body>
</html>
