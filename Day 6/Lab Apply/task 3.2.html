<script>
    for (i in document.images)
        document.images[i].onmouseover = stopAnimation,
        document.images[i].onmouseout = startAnimation;
    let id, cur = 4, size = 5;
    function stopAnimation()
    {
        clearInterval(id);
    }
    function startAnimation()
    {
        function ani()
        {
            document.images[cur].src = "Tasks\\TaskResources\\marbels\\marble1.jpg"
            cur++;
            cur %= size;
            document.images[cur].src = "Tasks\\TaskResources\\marbels\\marble3.jpg"
        }
        ani();
        id = setInterval(ani, 1000)
    }
    startAnimation();
</script>
